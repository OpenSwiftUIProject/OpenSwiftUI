name: 'Build XCFrameworks'
description: 'Build OpenSwiftUI xcframeworks and generate binaryTarget entries'

inputs:
  xcode-version:
    description: 'Xcode version to use'
    required: false
    default: '16.4'
  tag-name:
    description: 'Tag name for release URLs (empty for manual builds)'
    required: false
    default: ''
  signing-certificate-base64:
    description: 'Base64-encoded .p12 signing certificate'
    required: false
    default: ''
  signing-certificate-password:
    description: 'Password for the .p12 signing certificate'
    required: false
    default: ''

outputs:
  body:
    description: 'Release body with .binaryTarget entries'
    value: ${{ steps.checksums.outputs.body }}
  checksum_OpenSwiftUI:
    description: 'Checksum for OpenSwiftUI.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenSwiftUI }}
  checksum_OpenSwiftUICore:
    description: 'Checksum for OpenSwiftUICore.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenSwiftUICore }}
  checksum_OpenAttributeGraphShims:
    description: 'Checksum for OpenAttributeGraphShims.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenAttributeGraphShims }}
  checksum_OpenCoreGraphicsShims:
    description: 'Checksum for OpenCoreGraphicsShims.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenCoreGraphicsShims }}
  checksum_OpenObservation:
    description: 'Checksum for OpenObservation.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenObservation }}
  checksum_OpenQuartzCoreShims:
    description: 'Checksum for OpenQuartzCoreShims.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenQuartzCoreShims }}
  checksum_OpenRenderBoxShims:
    description: 'Checksum for OpenRenderBoxShims.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenRenderBoxShims }}

runs:
  using: 'composite'
  steps:
    - name: Setup Xcode
      uses: OpenSwiftUIProject/setup-xcode@v2
      with:
        xcode-version: ${{ inputs.xcode-version }}
    - name: Set up build environment
      run: Scripts/CI/darwin_setup_build.sh
      shell: bash
    - name: Build XCFrameworks
      run: Scripts/build_xcframework.sh OpenSwiftUI
      shell: bash
    - name: Code sign XCFrameworks
      if: ${{ inputs.signing-certificate-base64 != '' }}
      uses: ./.github/actions/codesign-xcframework
      with:
        signing-certificate-base64: ${{ inputs.signing-certificate-base64 }}
        signing-certificate-password: ${{ inputs.signing-certificate-password }}
        xcframework-paths: >-
          build/OpenSwiftUI.xcframework
          build/OpenSwiftUICore.xcframework
          build/OpenAttributeGraphShims.xcframework
          build/OpenCoreGraphicsShims.xcframework
          build/OpenObservation.xcframework
          build/OpenQuartzCoreShims.xcframework
          build/OpenRenderBoxShims.xcframework
    - name: Compute Checksums and Generate Summary
      id: checksums
      shell: bash
      env:
        TAG_NAME: ${{ inputs.tag-name }}
      run: |
        cd build
        FRAMEWORKS=(
          OpenSwiftUI
          OpenSwiftUICore
          OpenAttributeGraphShims
          OpenCoreGraphicsShims
          OpenObservation
          OpenQuartzCoreShims
          OpenRenderBoxShims
        )
        BODY=""
        echo "### XCFramework Binary Targets" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```swift' >> $GITHUB_STEP_SUMMARY
        for fw in "${FRAMEWORKS[@]}"; do
          if [ -n "$TAG_NAME" ]; then
            zip -ry "$fw.xcframework.zip" "$fw.xcframework"
            CHECKSUM=$(swift package compute-checksum "$fw.xcframework.zip")
            echo "checksum_${fw}=${CHECKSUM}" >> $GITHUB_OUTPUT
            ENTRY=$(printf '.binaryTarget(\n    name: "%s",\n    url: "https://github.com/OpenSwiftUIProject/OpenSwiftUI/releases/download/%s/%s.xcframework.zip",\n    checksum: "%s"\n),' "$fw" "$TAG_NAME" "$fw" "$CHECKSUM")
          else
            ENTRY=$(printf '.binaryTarget(\n    name: "%s",\n    path: "%s.xcframework"\n),' "$fw" "$fw")
          fi
          echo "$ENTRY" >> $GITHUB_STEP_SUMMARY
          if [ -n "$BODY" ]; then
            BODY=$(printf '%s\n%s' "$BODY" "$ENTRY")
          else
            BODY="$ENTRY"
          fi
        done
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
