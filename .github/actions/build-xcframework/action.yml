name: 'Build XCFrameworks'
description: 'Build OpenSwiftUI xcframeworks and generate binaryTarget entries'

inputs:
  xcode-version:
    description: 'Xcode version to use'
    required: false
    default: '26.3'
  tag-name:
    description: 'Tag name for release URLs (empty for manual builds)'
    required: false
    default: ''
  signing-certificate-base64:
    description: 'Base64-encoded .p12 signing certificate'
    required: false
    default: ''
  signing-certificate-password:
    description: 'Password for the .p12 signing certificate'
    required: false
    default: ''

outputs:
  body:
    description: 'Release body with .binaryTarget entries'
    value: ${{ steps.checksums.outputs.body }}
  checksum_OpenSwiftUI:
    description: 'Checksum for OpenSwiftUI.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenSwiftUI }}
  checksum_OpenSwiftUICore:
    description: 'Checksum for OpenSwiftUICore.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenSwiftUICore }}
  checksum_OpenAttributeGraphShims:
    description: 'Checksum for OpenAttributeGraphShims.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenAttributeGraphShims }}
  checksum_OpenCoreGraphicsShims:
    description: 'Checksum for OpenCoreGraphicsShims.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenCoreGraphicsShims }}
  checksum_OpenObservation:
    description: 'Checksum for OpenObservation.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenObservation }}
  checksum_OpenQuartzCoreShims:
    description: 'Checksum for OpenQuartzCoreShims.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenQuartzCoreShims }}
  checksum_OpenRenderBoxShims:
    description: 'Checksum for OpenRenderBoxShims.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenRenderBoxShims }}
  checksum_OpenSwiftUI_Compute:
    description: 'Checksum for OpenSwiftUI.Compute.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenSwiftUI_Compute }}
  checksum_OpenSwiftUICore_Compute:
    description: 'Checksum for OpenSwiftUICore.Compute.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenSwiftUICore_Compute }}
  checksum_OpenAttributeGraphShims_Compute:
    description: 'Checksum for OpenAttributeGraphShims.Compute.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenAttributeGraphShims_Compute }}
  checksum_OpenCoreGraphicsShims_Compute:
    description: 'Checksum for OpenCoreGraphicsShims.Compute.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenCoreGraphicsShims_Compute }}
  checksum_OpenObservation_Compute:
    description: 'Checksum for OpenObservation.Compute.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenObservation_Compute }}
  checksum_OpenQuartzCoreShims_Compute:
    description: 'Checksum for OpenQuartzCoreShims.Compute.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenQuartzCoreShims_Compute }}
  checksum_OpenRenderBoxShims_Compute:
    description: 'Checksum for OpenRenderBoxShims.Compute.xcframework.zip'
    value: ${{ steps.checksums.outputs.checksum_OpenRenderBoxShims_Compute }}

runs:
  using: 'composite'
  steps:
    - name: Setup Xcode
      uses: OpenSwiftUIProject/setup-xcode@v2
      with:
        xcode-version: ${{ inputs.xcode-version }}
    - name: Set up mise
      uses: jdx/mise-action@v2
      with:
        install: false
        cache: false
    - name: Install Tuist
      run: |
        mise trust mise.toml
        mise install
        tuist version
      shell: bash
    - name: Set up build environment
      run: Scripts/CI/darwin_setup_build.sh
      shell: bash
    - name: Build XCFrameworks
      run: Scripts/build_xcframework.sh OpenSwiftUI
      shell: bash
    - name: Build Compute XCFrameworks
      run: Scripts/build_xcframework.sh --compute --output-suffix Compute OpenSwiftUI
      shell: bash
    - name: Code sign XCFrameworks
      if: ${{ inputs.signing-certificate-base64 != '' }}
      uses: ./.github/actions/codesign-xcframework
      with:
        signing-certificate-base64: ${{ inputs.signing-certificate-base64 }}
        signing-certificate-password: ${{ inputs.signing-certificate-password }}
        xcframework-paths: >-
          build/OpenSwiftUI.xcframework
          build/OpenSwiftUICore.xcframework
          build/OpenAttributeGraphShims.xcframework
          build/OpenCoreGraphicsShims.xcframework
          build/OpenObservation.xcframework
          build/OpenQuartzCoreShims.xcframework
          build/OpenRenderBoxShims.xcframework
          build/OpenSwiftUI.Compute.xcframework
          build/OpenSwiftUICore.Compute.xcframework
          build/OpenAttributeGraphShims.Compute.xcframework
          build/OpenCoreGraphicsShims.Compute.xcframework
          build/OpenObservation.Compute.xcframework
          build/OpenQuartzCoreShims.Compute.xcframework
          build/OpenRenderBoxShims.Compute.xcframework
    - name: Compute Checksums and Generate Summary
      id: checksums
      shell: bash
      env:
        TAG_NAME: ${{ inputs.tag-name }}
      run: |
        cd build
        FRAMEWORKS=(
          OpenSwiftUI
          OpenSwiftUICore
          OpenAttributeGraphShims
          OpenCoreGraphicsShims
          OpenObservation
          OpenQuartzCoreShims
          OpenRenderBoxShims
        )
        BODY=""
        emit_binary_targets() {
          local suffix="$1"
          local title="$2"
          local collect_body="$3"

          echo "### ${title}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```swift' >> $GITHUB_STEP_SUMMARY
          for fw in "${FRAMEWORKS[@]}"; do
            local artifact="$fw"
            local checksum_key="$fw"
            if [ -n "$suffix" ]; then
              artifact="$fw.$suffix"
              checksum_key="${fw}_${suffix}"
            fi

            if [ -n "$TAG_NAME" ]; then
              rm -f "$artifact.xcframework.zip"
              zip -ry "$artifact.xcframework.zip" "$artifact.xcframework"
              CHECKSUM=$(swift package compute-checksum "$artifact.xcframework.zip")
              echo "checksum_${checksum_key}=${CHECKSUM}" >> $GITHUB_OUTPUT
              ENTRY=$(printf '.binaryTarget(\n    name: "%s",\n    url: "https://github.com/OpenSwiftUIProject/OpenSwiftUI/releases/download/%s/%s.xcframework.zip",\n    checksum: "%s"\n),' "$fw" "$TAG_NAME" "$artifact" "$CHECKSUM")
            else
              ENTRY=$(printf '.binaryTarget(\n    name: "%s",\n    path: "%s.xcframework"\n),' "$fw" "$artifact")
            fi
            echo "$ENTRY" >> $GITHUB_STEP_SUMMARY
            if [ "$collect_body" = true ]; then
              if [ -n "$BODY" ]; then
                BODY=$(printf '%s\n%s' "$BODY" "$ENTRY")
              else
                BODY="$ENTRY"
              fi
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        }

        emit_binary_targets "" "XCFramework Binary Targets" true
        emit_binary_targets "Compute" "Compute XCFramework Binary Targets" false

        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
