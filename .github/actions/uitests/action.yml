name: Run UI Tests
description: Execute UI tests and collect artifacts if failure

inputs:
  xcode-version:
    description: 'Xcode version to use'
    required: false
    default: '16.4'
  platform:
    description: 'Platform to test (ios or macos)'
    required: true
  destination:
    description: 'xcodebuild destination parameter'
    required: true
  artifact-name:
    description: 'Name for the artifact upload'
    required: true
  reference-root:
    description: 'Root directory for persistent UI test reference images'
    required: false
    default: /Volumes/Workspace/OpenSwiftUI_CI/ReferenceImages

outputs:
  test-result:
    description: 'Test execution result (success or failure)'
    value: ${{ steps.uitest.outcome }}

runs:
  using: composite
  steps:
    - name: Setup Xcode
      uses: OpenSwiftUIProject/setup-xcode@v2
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: Set up mise
      uses: jdx/mise-action@v2
      with:
        install: false
        cache: false

    - name: Install Tuist
      run: |
        cd Example
        mise trust mise.toml
        mise install
        tuist version
      shell: bash

    - name: Set up build environment
      run: Scripts/CI/darwin_setup_build.sh
      shell: bash

    - name: Install xcbeautify
      shell: bash
      run: brew install xcbeautify

    - name: Generate Example project
      shell: bash
      run: |
        cd Example
        mise exec -- tuist install
        mise exec -- tuist generate --no-open

    - name: Record baseline images with SwiftUI
      shell: bash
      run: |
        cd Example
        snapshot_reference_root="${{ inputs.reference-root }}"
        mkdir -p "$snapshot_reference_root"
        set -o pipefail
        NSUnbufferedIO=YES xcodebuild test \
          -workspace Example.xcworkspace \
          -scheme SUI_UITests \
          -destination "${{ inputs.destination }}" \
          -skipMacroValidation \
          -skipPackagePluginValidation \
          SNAPSHOT_REFERENCE_ROOT="$snapshot_reference_root" \
          2>&1 | xcbeautify --renderer github-actions --preserve-unbeautified || true

    - name: Run UI tests with OpenSwiftUI
      id: uitest
      continue-on-error: true
      shell: bash
      run: |
        cd Example
        snapshot_reference_root="${{ inputs.reference-root }}"
        mkdir -p "$snapshot_reference_root"
        rm -rf /tmp/${{ inputs.platform }}-uitest.xcresult
        set -o pipefail
        NSUnbufferedIO=YES xcodebuild test \
          -workspace Example.xcworkspace \
          -scheme OSUI_UITests \
          -destination "${{ inputs.destination }}" \
          -skipMacroValidation \
          -skipPackagePluginValidation \
          -resultBundlePath /tmp/${{ inputs.platform }}-uitest.xcresult \
          SNAPSHOT_REFERENCE_ROOT="$snapshot_reference_root" \
          2>&1 | tee /tmp/${{ inputs.platform }}-uitest.log | xcbeautify --renderer github-actions --preserve-unbeautified

    - name: Collect failed snapshots
      if: steps.uitest.outcome == 'failure'
      shell: bash
      run: |
        Scripts/CI/collect_uitest_failures.sh /tmp/${{ inputs.platform }}-uitest.log /tmp/uitest-artifacts

    - name: Upload test artifacts
      if: steps.uitest.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: /tmp/uitest-artifacts/
        retention-days: 7

    - name: Zip xcresult bundle
      if: steps.uitest.outcome == 'failure'
      shell: bash
      run: |
        cd /tmp
        mv ${{ inputs.platform }}-uitest.xcresult ${{ inputs.artifact-name }}.xcresult
        zip -r -q ${{ inputs.artifact-name }}.xcresult.zip ${{ inputs.artifact-name }}.xcresult

    - name: Upload xcresult bundle
      if: steps.uitest.outcome == 'failure'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}.xcresult.zip
        path: /tmp/${{ inputs.artifact-name }}.xcresult.zip
        archive: false
        retention-days: 7
