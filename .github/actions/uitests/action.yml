name: Run UI Tests
description: Execute UI tests and collect artifacts if failure

inputs:
  xcode-version:
    description: 'Xcode version to use'
    required: false
    default: '16.4'
  platform:
    description: 'Platform to test (ios or macos)'
    required: true
  destination:
    description: 'xcodebuild destination parameter'
    required: true
  artifact-name:
    description: 'Name for the artifact upload'
    required: true
  reference-root:
    description: 'Root directory for persistent UI test reference images'
    required: false
    default: /Volumes/Workspace/OpenSwiftUI_CI/ReferenceImages
  update-reference:
    description: 'Force updating reference images before running UI tests'
    required: false
    default: 'false'

outputs:
  test-result:
    description: 'Test execution result (success or failure)'
    value: ${{ steps.uitest.outcome }}

runs:
  using: composite
  steps:
    - name: Setup Xcode
      uses: OpenSwiftUIProject/setup-xcode@v2
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: Set up mise
      uses: jdx/mise-action@v2
      with:
        install: false
        cache: false

    - name: Install Tuist
      run: |
        cd Example
        mise trust mise.toml
        mise install
        tuist version
      shell: bash

    - name: Set up build environment
      run: Scripts/CI/darwin_setup_build.sh
      shell: bash

    - name: Disable LookInside & LookIn servers
      shell: bash
      run: |
        {
          echo "OPENSWIFTUI_EXAMPLE_LOOKINSIDE_SERVER=0"
          echo "OPENSWIFTUI_EXAMPLE_LOOKIN_SERVER=0"
        } >> "$GITHUB_ENV"

    - name: Generate Example project
      shell: bash
      run: |
        cd Example
        mise exec -- tuist install
        mise exec -- tuist generate --no-open

    - name: Resolve snapshot reference directory
      id: reference
      shell: bash
      run: |
        snapshot_reference_root="${{ inputs.reference-root }}"
        case "${{ inputs.platform }}" in
          macos)
            snapshot_platform="macOS"
            snapshot_version="$(sw_vers -productVersion)"
            ;;
          ios)
            snapshot_platform="iOS_Simulator"
            snapshot_version="$(sed -n 's/.*OS=\([^,]*\).*/\1/p' <<< "${{ inputs.destination }}")"
            if [[ -z "$snapshot_version" ]]; then
              echo "::error::Unable to resolve iOS simulator version from destination: ${{ inputs.destination }}"
              exit 1
            fi
            IFS=. read -r major minor patch extra <<< "$snapshot_version"
            patch="${patch:-0}"
            snapshot_version="$major.$minor.$patch"
            ;;
          *)
            echo "::error::Unsupported UI test platform: ${{ inputs.platform }}"
            exit 1
            ;;
        esac

        snapshot_reference_dir="$snapshot_reference_root/$snapshot_platform/$snapshot_version"
        needs_record="${{ inputs.update-reference }}"
        if [[ "$needs_record" != "true" ]]; then
          if [[ -d "$snapshot_reference_dir" ]] && find "$snapshot_reference_dir" -type f -print -quit | grep -q .; then
            needs_record="false"
          else
            needs_record="true"
          fi
        fi

        echo "root=$snapshot_reference_root" >> "$GITHUB_OUTPUT"
        echo "directory=$snapshot_reference_dir" >> "$GITHUB_OUTPUT"
        echo "needs-record=$needs_record" >> "$GITHUB_OUTPUT"
        echo "Snapshot reference directory: $snapshot_reference_dir"
        echo "Record SwiftUI baseline: $needs_record"

    - name: Use persistent snapshot reference directory
      shell: bash
      run: |
        cd Example
        snapshot_reference_root="${{ steps.reference.outputs.root }}"
        ruby -e '
          value = ARGV.fetch(0)
          paths = ARGV.drop(1)
          paths.each do |path|
            text = File.read(path)
            environment_variable = [
              "         <EnvironmentVariable",
              "            key = \"SNAPSHOT_REFERENCE_DIR\"",
              "            value = \"#{value}\"",
              "            isEnabled = \"YES\">",
              "         </EnvironmentVariable>",
            ].join("\n")
            updated = if text.include?("key = \"SNAPSHOT_REFERENCE_DIR\"")
              text.gsub(/(key = "SNAPSHOT_REFERENCE_DIR"\n\s+value = ")[^"]+(")/) do
                "#{$1}#{value}#{$2}"
              end
            else
              text.sub(/(<EnvironmentVariables>\n)/) do
                "#{$1}#{environment_variable}\n"
              end
            end
            abort("EnvironmentVariables block not found in #{path}") if updated == text
            File.write(path, updated)
          end
        ' \
          "$snapshot_reference_root" \
          Example.xcodeproj/xcshareddata/xcschemes/SUI_UITests.xcscheme \
          Example.xcodeproj/xcshareddata/xcschemes/OSUI_UITests.xcscheme

    - name: Record baseline images with SwiftUI
      if: steps.reference.outputs.needs-record == 'true'
      shell: bash
      run: |
        cd Example
        snapshot_reference_root="${{ steps.reference.outputs.root }}"
        snapshot_reference_dir="${{ steps.reference.outputs.directory }}"
        lockfile="$snapshot_reference_root/.lock"
        mkdir -p "$snapshot_reference_root"

        if ( set -o noclobber; printf '%s\n' "run=${GITHUB_RUN_ID} job=${GITHUB_JOB} attempt=${GITHUB_RUN_ATTEMPT}" > "$lockfile" ) 2>/dev/null; then
          trap 'rm -f "$lockfile"' EXIT INT TERM
        else
          echo "::error::Snapshot reference images are locked by $(cat "$lockfile" 2>/dev/null || echo "another UI test run")."
          exit 1
        fi

        set -o pipefail
        record_status=0
        NSUnbufferedIO=YES xcodebuild test \
          -workspace Example.xcworkspace \
          -scheme SUI_UITests \
          -destination "${{ inputs.destination }}" \
          -skipMacroValidation \
          -skipPackagePluginValidation \
          2>&1 || record_status=$?

        if [[ "$record_status" -ne 0 ]]; then
          echo "SwiftUI baseline recording exited with status $record_status; continuing if reference images were written."
        fi

        if [[ ! -d "$snapshot_reference_dir" ]] || ! find "$snapshot_reference_dir" -type f -print -quit | grep -q .; then
          echo "::error::SwiftUI baseline did not create reference images in $snapshot_reference_dir."
          if [[ "$record_status" -ne 0 ]]; then
            exit "$record_status"
          fi
          exit 1
        fi

    - name: Run UI tests with OpenSwiftUI
      id: uitest
      continue-on-error: true
      shell: bash
      run: |
        cd Example
        uitest_tmp="${RUNNER_TEMP:-/tmp}/uitests-${GITHUB_RUN_ID}-${{ inputs.platform }}"
        rm -rf "$uitest_tmp"
        mkdir -p "$uitest_tmp/artifacts"
        result_bundle="$uitest_tmp/${{ inputs.platform }}-uitest.xcresult"
        test_log="$uitest_tmp/${{ inputs.platform }}-uitest.log"
        echo "tmp_dir=$uitest_tmp" >> "$GITHUB_OUTPUT"
        echo "result_bundle=$result_bundle" >> "$GITHUB_OUTPUT"
        echo "test_log=$test_log" >> "$GITHUB_OUTPUT"
        echo "artifact_dir=$uitest_tmp/artifacts" >> "$GITHUB_OUTPUT"
        echo "xcresult_archive=$uitest_tmp/${{ inputs.artifact-name }}.xcresult.zip" >> "$GITHUB_OUTPUT"
        set -o pipefail
        NSUnbufferedIO=YES xcodebuild test \
          -workspace Example.xcworkspace \
          -scheme OSUI_UITests \
          -destination "${{ inputs.destination }}" \
          -skipMacroValidation \
          -skipPackagePluginValidation \
          -resultBundlePath "$result_bundle" \
          2>&1 | tee "$test_log"

    - name: Collect failed snapshots
      if: steps.uitest.outcome == 'failure'
      shell: bash
      run: |
        Scripts/CI/collect_uitest_failures.sh \
          "${{ steps.uitest.outputs.test_log }}" \
          "${{ steps.uitest.outputs.artifact_dir }}"

    - name: Upload test artifacts
      if: steps.uitest.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.uitest.outputs.artifact_dir }}
        retention-days: 7

    - name: Zip xcresult bundle
      if: steps.uitest.outcome == 'failure'
      shell: bash
      run: |
        uitest_tmp="${{ steps.uitest.outputs.tmp_dir }}"
        result_bundle="${{ steps.uitest.outputs.result_bundle }}"
        archive_bundle="$uitest_tmp/${{ inputs.artifact-name }}.xcresult"
        archive_path="${{ steps.uitest.outputs.xcresult_archive }}"
        rm -rf "$archive_bundle" "$archive_path"
        mv "$result_bundle" "$archive_bundle"
        cd "$uitest_tmp"
        zip -r -q "$archive_path" "${{ inputs.artifact-name }}.xcresult"

    - name: Upload xcresult bundle
      if: steps.uitest.outcome == 'failure'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}.xcresult.zip
        path: ${{ steps.uitest.outputs.xcresult_archive }}
        archive: false
        retention-days: 7
