name: Publish Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-15
    env:
      OPENSWIFTUI_OPENATTRIBUTESHIMS_ATTRIBUTEGRAPH: 1
      OPENSWIFTUI_USE_LOCAL_DEPS: 1
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Xcode
        uses: ./.github/actions/setup-xcode
        with:
          xcode-version: "16.4"
      - name: Set up build environment
        run: Scripts/CI/darwin_setup_build.sh
        shell: bash
      - name: Build XCFrameworks
        run: Scripts/build_xcframework.sh OpenSwiftUI
        shell: bash
      - name: Zip and Compute Checksums
        id: checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd build
          FRAMEWORKS=(
            OpenSwiftUI
            OpenSwiftUICore
            OpenAttributeGraphShims
            OpenCoreGraphicsShims
            OpenObservation
            OpenQuartzCoreShims
            OpenRenderBoxShims
          )
          BODY=""
          echo "### XCFramework Checksums" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```swift' >> $GITHUB_STEP_SUMMARY
          for fw in "${FRAMEWORKS[@]}"; do
            zip -r "$fw.xcframework.zip" "$fw.xcframework"
            CHECKSUM=$(swift package compute-checksum "$fw.xcframework.zip")
            ENTRY=$(printf '.binaryTarget(\n    name: "%s",\n    url: "https://github.com/OpenSwiftUIProject/OpenSwiftUI/releases/download/%s/%s.xcframework.zip",\n    checksum: "%s"\n),' "$fw" "$TAG_NAME" "$fw" "$CHECKSUM")
            echo "$ENTRY" >> $GITHUB_STEP_SUMMARY
            if [ -n "$BODY" ]; then
              BODY=$(printf '%s\n%s' "$BODY" "$ENTRY")
            else
              BODY="$ENTRY"
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          body: |
            ```swift
            ${{ steps.checksums.outputs.body }}
            ```
          allowUpdates: true
          artifacts: "build/*.xcframework.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: xcframeworks
          path: build/*.xcframework.zip
