name: Publish Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-15
    env:
      OPENSWIFTUI_OPENATTRIBUTESHIMS_ATTRIBUTEGRAPH: 1
      OPENSWIFTUI_USE_LOCAL_DEPS: 1
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Xcode
        uses: ./.github/actions/setup-xcode
        with:
          xcode-version: "16.4"
      - name: Set up build environment
        run: Scripts/CI/darwin_setup_build.sh
        shell: bash
      - name: Build XCFrameworks
        run: Scripts/build_xcframework.sh OpenSwiftUI
        shell: bash
      - name: Zip and Compute Checksums
        id: checksums
        run: |
          cd build
          FRAMEWORKS=(
            OpenSwiftUI
            OpenSwiftUICore
            OpenAttributeGraphShims
            OpenCoreGraphicsShims
            OpenObservation
            OpenQuartzCoreShims
            OpenRenderBoxShims
          )
          ARTIFACTS=""
          BODY=""
          echo "### XCFramework Checksums" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```swift' >> $GITHUB_STEP_SUMMARY
          for fw in "${FRAMEWORKS[@]}"; do
            zip -r "$fw.xcframework.zip" "$fw.xcframework"
            CHECKSUM=$(swift package compute-checksum "$fw.xcframework.zip")
            echo "${fw}_checksum=$CHECKSUM" >> $GITHUB_OUTPUT
            echo ".binaryTarget(" >> $GITHUB_STEP_SUMMARY
            echo "    name: \"$fw\"," >> $GITHUB_STEP_SUMMARY
            echo "    url: \"https://github.com/OpenSwiftUIProject/OpenSwiftUI/releases/download/\${TAG}/$fw.xcframework.zip\"," >> $GITHUB_STEP_SUMMARY
            echo "    checksum: \"$CHECKSUM\"" >> $GITHUB_STEP_SUMMARY
            echo ")," >> $GITHUB_STEP_SUMMARY
            if [ -n "$ARTIFACTS" ]; then
              ARTIFACTS="$ARTIFACTS,"
              BODY="$BODY\n"
            fi
            ARTIFACTS="$ARTIFACTS\nbuild/$fw.xcframework.zip"
            BODY="$BODY.binaryTarget(\n    name: \"$fw\",\n    url: \"https://github.com/OpenSwiftUIProject/OpenSwiftUI/releases/download/\${{ github.ref_name }}/$fw.xcframework.zip\",\n    checksum: \"$CHECKSUM\"\n),"
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "artifacts<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ARTIFACTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          body: |
            ```swift
            ${{ steps.checksums.outputs.body }}
            ```
          allowUpdates: true
          artifacts: "build/*.xcframework.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Output Summary (manual trigger)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "### Manual Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts available in build/*.xcframework.zip" >> $GITHUB_STEP_SUMMARY
      - name: Upload Artifacts (manual trigger)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: xcframeworks
          path: build/*.xcframework.zip
