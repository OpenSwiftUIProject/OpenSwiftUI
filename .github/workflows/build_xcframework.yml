name: Build XCFramework

on:
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-15
    env:
      OPENSWIFTUI_OPENATTRIBUTESHIMS_ATTRIBUTEGRAPH: 1
      OPENSWIFTUI_USE_LOCAL_DEPS: 1
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Build XCFramework
        uses: ./.github/actions/build-xcframework
        with:
          signing-certificate-base64: ${{ secrets.SIGNING_CERTIFICATE_BASE_64 }}
          signing-certificate-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
      - name: Zip XCFramework
        run: cd build && zip -ry OpenSwiftUI.xcframework.zip OpenSwiftUI.xcframework
      - name: Upload XCFramework
        uses: actions/upload-artifact@v7
        with:
          path: build/OpenSwiftUI.xcframework.zip
          archive: false
