name: UI Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to test
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - macos
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  ios_uitest:
    name: Execute UI tests on iOS
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && contains(fromJSON('["all", "ios"]'), inputs.platform)) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
        (
          github.event.comment.body == '/uitest' ||
          startsWith(github.event.comment.body, '/uitest all') ||
          startsWith(github.event.comment.body, '/uitest ios')
        )
      )
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
        xcode-version: ["16.4"]
        release: [2024]
        ios-version: ["18.5"]
        include:
          - ios-version: "18.5"
            ios-simulator-name: "iPhone 16 Pro"
    # Limit to self-hosted to reduce action cost
    runs-on:
      - self-hosted
      - ${{ matrix.os }}
    env:
      OPENSWIFTUI_WERROR: 0 # Disable it to avoid enable OAG's werror and hit conflicts
      OPENSWIFTUI_OPENATTRIBUTESHIMS_ATTRIBUTEGRAPH: 1
      OPENSWIFTUI_COMPATIBILITY_TEST: 0
      OPENSWIFTUI_SWIFT_LOG: 0
      OPENSWIFTUI_SWIFT_CRYPTO: 0
      OPENSWIFTUI_TARGET_RELEASE: ${{ matrix.release }}
      OPENSWIFTUI_SUPPORT_MULTI_PRODUCTS: 0
      OPENSWIFTUI_USE_LOCAL_DEPS: 1
      OPENSWIFTUI_LINK_TESTING: 0
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve PR checkout target
        if: github.event_name == 'issue_comment'
        id: pull-request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.issue.number;
            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number });
            core.setOutput("repository", pull.head.repo.full_name);
            core.setOutput("ref", pull.head.sha);
      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.pull-request.outputs.repository || github.repository }}
          ref: ${{ steps.pull-request.outputs.ref || github.sha }}
      - name: Setup Xcode
        uses: OpenSwiftUIProject/setup-xcode@v2
        with:
          xcode-version: ${{ matrix.xcode-version }}
      - name: Set up build environment
        run: Scripts/CI/darwin_setup_build.sh
        shell: bash
      - name: Run UI Tests
        id: run-tests
        uses: ./.github/actions/uitests
        with:
          platform: ios
          destination: "platform=iOS Simulator,OS=${{ matrix.ios-version }},name=${{ matrix.ios-simulator-name }}"
          artifact-name: ios-uitest-snapshots-${{ matrix.ios-version }}
      - name: Fail if tests failed
        if: steps.run-tests.outputs.test-result == 'failure'
        run: exit 1

  macos_uitest:
    name: Execute UI tests on macOS
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && contains(fromJSON('["all", "macos"]'), inputs.platform)) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
        (
          github.event.comment.body == '/uitest' ||
          startsWith(github.event.comment.body, '/uitest all') ||
          startsWith(github.event.comment.body, '/uitest macos')
        )
      )
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
        xcode-version: ["16.4"]
        release: [2024]
    # Limit to self-hosted to reduce action cost
    runs-on:
      - self-hosted
      - ${{ matrix.os }}
    env:
      OPENSWIFTUI_WERROR: 0
      OPENSWIFTUI_OPENATTRIBUTESHIMS_ATTRIBUTEGRAPH: 1
      OPENSWIFTUI_COMPATIBILITY_TEST: 0
      OPENSWIFTUI_SWIFT_LOG: 0
      OPENSWIFTUI_SWIFT_CRYPTO: 0
      OPENSWIFTUI_TARGET_RELEASE: ${{ matrix.release }}
      OPENSWIFTUI_SUPPORT_MULTI_PRODUCTS: 0
      OPENSWIFTUI_USE_LOCAL_DEPS: 1
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve PR checkout target
        if: github.event_name == 'issue_comment'
        id: pull-request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.issue.number;
            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number });
            core.setOutput("repository", pull.head.repo.full_name);
            core.setOutput("ref", pull.head.sha);
      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.pull-request.outputs.repository || github.repository }}
          ref: ${{ steps.pull-request.outputs.ref || github.sha }}
      - name: Setup Xcode
        uses: OpenSwiftUIProject/setup-xcode@v2
        with:
          xcode-version: ${{ matrix.xcode-version }}
      - name: Set up build environment
        run: Scripts/CI/darwin_setup_build.sh
        shell: bash
      - name: Run UI Tests
        id: run-tests
        uses: ./.github/actions/uitests
        with:
          platform: macos
          destination: "platform=macOS"
          artifact-name: macos-uitest-snapshots
      - name: Fail if tests failed
        if: steps.run-tests.outputs.test-result == 'failure'
        run: exit 1
