name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build-xcframeworks:
    name: Build and Upload XCFrameworks
    runs-on: macos-15
    outputs:
      checksum_OpenSwiftUI: ${{ steps.build.outputs.checksum_OpenSwiftUI }}
      checksum_OpenSwiftUICore: ${{ steps.build.outputs.checksum_OpenSwiftUICore }}
      checksum_OpenAttributeGraphShims: ${{ steps.build.outputs.checksum_OpenAttributeGraphShims }}
      checksum_OpenCoreGraphicsShims: ${{ steps.build.outputs.checksum_OpenCoreGraphicsShims }}
      checksum_OpenObservation: ${{ steps.build.outputs.checksum_OpenObservation }}
      checksum_OpenQuartzCoreShims: ${{ steps.build.outputs.checksum_OpenQuartzCoreShims }}
      checksum_OpenRenderBoxShims: ${{ steps.build.outputs.checksum_OpenRenderBoxShims }}
    env:
      OPENSWIFTUI_OPENATTRIBUTESHIMS_ATTRIBUTEGRAPH: 0
      OPENSWIFTUI_OPENATTRIBUTESHIMS_DANCEUIGRAPH: 0
      OPENSWIFTUI_OPENATTRIBUTESHIMS_COMPUTE: 1
      OPENSWIFTUI_OPENATTRIBUTESHIMS_COMPUTE_BINARY: 0
      OPENSWIFTUI_USE_LOCAL_DEPS: 1
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Build XCFrameworks
        id: build
        uses: ./.github/actions/build-xcframework
        with:
          tag-name: ${{ github.ref_name }}
          signing-certificate-base64: ${{ secrets.SIGNING_CERTIFICATE_BASE_64 }}
          signing-certificate-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
      - name: Create release
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists."
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes "Release assets are being uploaded. Release notes will be added after the binary package update completes."
          fi
      - name: Upload assets to release
        run: gh release upload "${{ github.ref_name }}" build/*.xcframework.zip --clobber

  update-binary-repo:
    name: Update OpenSwiftUI-spm
    needs: build-xcframeworks
    runs-on: ubuntu-latest
    env:
      BINARY_REPO_PAT: ${{ secrets.BINARY_REPO_PAT }}
    steps:
      - name: Update binary repo
        env:
          VERSION: ${{ github.ref_name }}
          CHECKSUM_OpenSwiftUI: ${{ needs.build-xcframeworks.outputs.checksum_OpenSwiftUI }}
          CHECKSUM_OpenSwiftUICore: ${{ needs.build-xcframeworks.outputs.checksum_OpenSwiftUICore }}
          CHECKSUM_OpenAttributeGraphShims: ${{ needs.build-xcframeworks.outputs.checksum_OpenAttributeGraphShims }}
          CHECKSUM_OpenCoreGraphicsShims: ${{ needs.build-xcframeworks.outputs.checksum_OpenCoreGraphicsShims }}
          CHECKSUM_OpenObservation: ${{ needs.build-xcframeworks.outputs.checksum_OpenObservation }}
          CHECKSUM_OpenQuartzCoreShims: ${{ needs.build-xcframeworks.outputs.checksum_OpenQuartzCoreShims }}
          CHECKSUM_OpenRenderBoxShims: ${{ needs.build-xcframeworks.outputs.checksum_OpenRenderBoxShims }}
        run: |
          if [ -z "$BINARY_REPO_PAT" ]; then
            echo "::notice::BINARY_REPO_PAT not set, skipping binary repo update"
            exit 0
          fi
          git clone https://x-access-token:${BINARY_REPO_PAT}@github.com/OpenSwiftUIProject/OpenSwiftUI-spm.git
          cd OpenSwiftUI-spm
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          render_package() {
            local checksum_OpenSwiftUI="$1"
            local checksum_OpenSwiftUICore="$2"
            local checksum_OpenAttributeGraphShims="$3"
            local checksum_OpenCoreGraphicsShims="$4"
            local checksum_OpenObservation="$5"
            local checksum_OpenQuartzCoreShims="$6"
            local checksum_OpenRenderBoxShims="$7"

            sed \
              -e "s|{{VERSION}}|${VERSION}|g" \
              -e "s|{{CHECKSUM_OpenSwiftUI}}|${checksum_OpenSwiftUI}|g" \
              -e "s|{{CHECKSUM_OpenSwiftUICore}}|${checksum_OpenSwiftUICore}|g" \
              -e "s|{{CHECKSUM_OpenAttributeGraphShims}}|${checksum_OpenAttributeGraphShims}|g" \
              -e "s|{{CHECKSUM_OpenCoreGraphicsShims}}|${checksum_OpenCoreGraphicsShims}|g" \
              -e "s|{{CHECKSUM_OpenObservation}}|${checksum_OpenObservation}|g" \
              -e "s|{{CHECKSUM_OpenQuartzCoreShims}}|${checksum_OpenQuartzCoreShims}|g" \
              -e "s|{{CHECKSUM_OpenRenderBoxShims}}|${checksum_OpenRenderBoxShims}|g" \
              Package.swift.template > Package.swift
          }

          update_readme_version() {
            perl -0pi -e 's|(\.package\(url:\s*"https://github\.com/OpenSwiftUIProject/OpenSwiftUI-spm",\s*from:\s*")[^"]+(")|$1$ENV{VERSION}$2|g' README.md
          }

          commit_package_if_needed() {
            local message="$1"
            git add Package.swift README.md
            if git diff --cached --quiet; then
              echo "No changes for $(git branch --show-current)"
              return 1
            fi
            git commit -m "$message"
          }

          render_package \
            "$CHECKSUM_OpenSwiftUI" \
            "$CHECKSUM_OpenSwiftUICore" \
            "$CHECKSUM_OpenAttributeGraphShims" \
            "$CHECKSUM_OpenCoreGraphicsShims" \
            "$CHECKSUM_OpenObservation" \
            "$CHECKSUM_OpenQuartzCoreShims" \
            "$CHECKSUM_OpenRenderBoxShims"
          update_readme_version
          echo "Generated Package.swift:"
          head -50 Package.swift
          if commit_package_if_needed "Update to ${VERSION} with code-signed XCFrameworks"; then
            git tag "${VERSION}"
          fi
          git push origin main --tags

  release-notes:
    uses: ./.github/workflows/release_notes.yml
    needs: update-binary-repo
    with:
      tag-name: ${{ github.ref_name }}
    secrets: inherit
